{% extends "base.html" %}
{% block content %}
<div style="color:var(--mut);font-size:13px;margin-bottom:16px">
  AI yordamchi bilan suhbatlashing — vaziyatni yozing, AI <b>local ma'lumotlar asosida</b> xavfni baholaydi va harakatlarni tavsiya qiladi.
  <b>Yakuniy qaror har doim mas'ul xodimda.</b>
</div>
<div class="card" style="display:flex;flex-direction:column;height:calc(100vh - 250px);min-height:440px;padding:0;overflow:hidden">
  <div id="chatlog" style="flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:14px"></div>
  <div style="padding:14px 16px;border-top:1px solid var(--line);background:#fff">
    <div id="chips" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:11px"></div>
    <div class="rowflex">
      <input id="msg" placeholder="Vaziyatni yozing va Enter bosing..." style="flex:1"
        onkeydown="if(event.key==='Enter'){event.preventDefault();send();}">
      <button class="btn" onclick="send()">{{ ic.send|safe }} Yuborish</button>
    </div>
  </div>
</div>
{% endblock %}
{% block script %}<script src="{{ url_for('static', filename='js/assistant.js') }}"></script>{% endblock %}
